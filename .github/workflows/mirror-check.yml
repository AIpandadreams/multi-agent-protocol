name: mirror-check
on:
  push:
  pull_request:
jobs:
  mirror-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python tools/mirror_check.py
      - run: python tools/release_scrub.py . --patterns examples/scrub_patterns.example.txt --private-path profiles/private
      - run: python -m unittest discover -s tests -v
